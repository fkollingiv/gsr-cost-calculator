<style>
:root {
  --green: #006845;
  --green-dark: #004d33;
  --green-light: #e8f2ee;
  --green-mid: #b5d4c8;
  --text: #222;
  --muted: #555;
  --border: #ccc;
  --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; color: var(--text); font-size: 16px; background: #fff; }

.gsr-estimator { max-width: 800px; margin: 0 auto; padding: 28px 20px 60px; }
.gsr-tool-title { color: var(--green); font-size: 26px; font-weight: 700; margin-bottom: 4px; }
.gsr-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

/* Progress */
.gsr-progress-wrap { margin-bottom: 28px; }
.gsr-progress-bar { display: flex; gap: 5px; }
.gsr-progress-step { flex: 1; height: 7px; background: #ddd; border-radius: 4px; transition: background .25s; }
.gsr-progress-step.active { background: var(--green); }
.gsr-progress-step.done { background: var(--green-dark); }
.gsr-progress-label { font-size: 12px; color: var(--muted); margin-top: 5px; }

/* Step headings */
.gsr-step-title { font-size: 21px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
.gsr-step-desc  { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

/* Cards */
.gsr-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; margin-bottom: 26px; }
.gsr-card { border: 2px solid var(--border); border-radius: var(--radius); padding: 18px 14px; cursor: pointer; transition: border-color .2s, background .2s; text-align: center; }
.gsr-card:hover { border-color: var(--green); background: var(--green-light); }
.gsr-card.selected { border-color: var(--green); background: var(--green-light); }
.gsr-card .card-icon  { font-size: 26px; margin-bottom: 8px; }
.gsr-card .card-label { font-weight: 700; font-size: 15px; color: var(--green); margin-bottom: 4px; }
.gsr-card .card-desc  { font-size: 12px; color: var(--muted); line-height: 1.4; }

/* Form fields */
.gsr-field { margin-bottom: 20px; }
.gsr-field label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; }
.gsr-input-num { width: 130px; padding: 9px 10px; font-size: 15px; border: 2px solid var(--border); border-radius: var(--radius); }
.gsr-input-num:focus { outline: none; border-color: var(--green); }
.field-note { font-size: 12px; color: var(--muted); margin-top: 5px; }

/* Checkboxes */
.gsr-check-group { display: flex; flex-direction: column; gap: 12px; }
.gsr-check-item { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
.gsr-check-item input[type="checkbox"] { width: 17px; height: 17px; margin-top: 2px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
.gsr-check-item .cb-text { flex: 1; }
.gsr-check-item .cb-label { font-size: 14px; font-weight: 600; }
.gsr-check-item .cb-price { font-size: 12px; color: var(--muted); }
.gsr-sub-check { padding-left: 27px; }

/* Reads box */
.gsr-reads-box { background: var(--green-light); border: 1px solid var(--green-mid); border-radius: var(--radius); padding: 18px; margin-bottom: 22px; }
.gsr-reads-box .reads-header { font-weight: 700; font-size: 14px; margin-bottom: 10px; color: var(--green-dark); }
.gsr-reads-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.gsr-reads-row input { width: 110px; padding: 8px 10px; border: 2px solid var(--border); border-radius: var(--radius); font-size: 15px; }
.gsr-reads-row input:focus { outline: none; border-color: var(--green); }
.gsr-reads-total { font-size: 14px; color: var(--text); }
.gsr-rec-note { font-size: 12px; color: var(--green-dark); margin-top: 8px; font-style: italic; }

/* Run table */
.gsr-run-options { margin-bottom: 22px; }
.gsr-run-options h4 { font-size: 15px; font-weight: 700; color: var(--green); margin-bottom: 10px; }
.gsr-run-scroll { overflow-x: auto; }
table.gsr-run-table { width: 100%; border-collapse: collapse; font-size: 13.5px; table-layout: fixed; }
table.gsr-run-table th  { background: var(--green); color: #fff; padding: 9px 11px; text-align: left; white-space: nowrap; }
table.gsr-run-table th:first-child { width: 40%; }
table.gsr-run-table td  { padding: 9px 11px; border-bottom: 1px solid #e5e5e5; vertical-align: middle; white-space: nowrap; }
table.gsr-run-table td:first-child { white-space: normal; word-wrap: break-word; }
table.gsr-run-table tr:last-child td { border-bottom: none; }
table.gsr-run-table tr.rec-row   td { background: var(--green-light); }
table.gsr-run-table td.run-name { font-weight: 500; }
.badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; margin-left: 5px; vertical-align: middle; }
.badge-best { background: var(--green); color: #fff; }

/* Summary */
.gsr-summary-box { background: #fafafa; border: 1px solid #ddd; border-radius: var(--radius); overflow: hidden; margin-bottom: 18px; }
table.gsr-summary-table { width: 100%; border-collapse: collapse; font-size: 15px; }
table.gsr-summary-table th        { background: var(--green); color: #fff; padding: 11px 16px; text-align: left; }
table.gsr-summary-table th.right  { text-align: right; }
table.gsr-summary-table td        { padding: 10px 16px; border-bottom: 1px solid #e5e5e5; }
table.gsr-summary-table td.right  { text-align: right; }
table.gsr-summary-table td.note   { font-size: 12px; color: var(--muted); font-style: italic; padding-top: 2px; padding-bottom: 8px; border-bottom: 1px solid #e5e5e5; }
table.gsr-summary-table tr.total-row td { font-weight: 700; font-size: 16px; border-top: 2px solid var(--green); background: var(--green-light); border-bottom: none; }

.gsr-info-box { background: var(--green-light); border: 1px solid var(--green-mid); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 18px; font-size: 13px; color: var(--green-dark); line-height: 1.5; }
.gsr-disclaimer { font-size: 12px; color: #777; font-style: italic; margin-bottom: 22px; line-height: 1.5; }
.gsr-submit-help { font-size: 13.5px; color: var(--text); background: var(--green-light); border-left: 3px solid var(--green); padding: 10px 14px; margin: 0 0 18px; line-height: 1.45; border-radius: 3px; }
.gsr-disclaimer a { color: var(--green); }

/* Buttons */
.gsr-btn-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.gsr-btn { padding: 11px 28px; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; }
.gsr-btn-primary   { background: var(--green); color: #fff; }
.gsr-btn-primary:hover { background: var(--green-dark); }
.gsr-btn-primary:disabled { background: #aaa; cursor: not-allowed; }
.gsr-btn-secondary { background: #fff; color: var(--green); border: 2px solid var(--green); }
.gsr-btn-secondary:hover { background: var(--green-light); }
.gsr-btn-ghost { background: transparent; color: #666; border: 2px solid #ccc; }
.gsr-btn-ghost:hover { background: #f2f2f2; }

hr.gsr-divider { border: none; border-top: 1px solid #e0e0e0; margin: 22px 0; }

@media (max-width: 520px) {
  .gsr-cards { grid-template-columns: 1fr; }
  .gsr-btn-row { flex-direction: column; }
  .gsr-btn { width: 100%; text-align: center; }
}
@media print {
  .gsr-btn-row, .gsr-progress-wrap { display: none; }
}
</style>
<div class="gsr-estimator">
  <h1 class="gsr-tool-title">GSR Cost Estimator</h1>
  <p class="gsr-subtitle">Build an estimated cost for your genomics experiment. Prices reflect FY27 internal (Dartmouth) rates.</p>
  <div class="gsr-progress-wrap">
    <div class="gsr-progress-bar" id="progressBar"></div>
    <div class="gsr-progress-label" id="progressLabel"></div>
  </div>
  <div id="wizardContent"></div>
</div>

<script>
// ─── PRICING DATA ──────────────────────────────────────────────────────────
var P = {
  extraction:      13.84,
  extractionFFPE:  10.60,
  laborRate:      129.99,   // $/hour (FY27)
  tissueCellPrep: 138.75,
  sampleFixation: 156.66,
  flexTissuePrepFixation: 155.00,
  qubit:            2.48,
  fragAnalyzer:     8.72,

  // recCycles: recommended sequencing kit cycle length for this assay
  bulk: {
    ribo:  { name: 'RNA-seq: Ribo(-)',  price: 93.05, defaultReads: 40, recCycles: 100 },
    e3end: { name: "RNA-seq: 3'-End",   price: 48.73, defaultReads: 10, recCycles: 100 },
    tcr:   { name: 'TCR-seq',           price: 103.94, defaultReads: 5, recCycles: 600 },
    bcr:   { name: 'BCR-seq',           price: 103.94, defaultReads: 5, recCycles: 600 },
    dna:   { name: 'DNA-seq',           price: 56.87, defaultReads: 30, recCycles: 300 }
  },

  // readsM: maximum reads output per run; cycles: kit cycle length
  runs: [
    { id:'partial_10m',  name:'10M reads',  price:53.33,    readsM:10,   cycles:100 },
    { id:'partial_50m',  name:'50M reads',  price:151.81,   readsM:50,   cycles:100 },
    { id:'partial_250m', name:'250M reads', price:803.50,   readsM:250,  cycles:100 },
    { id:'p1_100', name:'NextSeq P1 100-cycle', price:1181.38,  readsM:120,  cycles:100 },
    { id:'p1_300', name:'NextSeq P1 300-cycle', price:1415.88,  readsM:120,  cycles:300 },
    { id:'p1_600', name:'NextSeq P1 600-cycle', price:2005.13,  readsM:120,  cycles:600 },
    { id:'p2_100', name:'NextSeq P2 100-cycle', price:1507.57,  readsM:500,  cycles:100 },
    { id:'p2_300', name:'NextSeq P2 300-cycle', price:1799.78,  readsM:500,  cycles:300 },
    { id:'p2_600', name:'NextSeq P2 600-cycle', price:3533.63,  readsM:500,  cycles:600 },
    { id:'p3_100', name:'NextSeq P3 100-cycle', price:2105.22,  readsM:1300, cycles:100 },
    { id:'p3_300', name:'NextSeq P3 300-cycle', price:3113.77,  readsM:1300, cycles:300 },
    { id:'p4_100', name:'NextSeq P4 100-cycle', price:2810.13,  readsM:2000, cycles:100 },
    { id:'p4_300', name:'NextSeq P4 300-cycle', price:4285.23,  readsM:2000, cycles:300 },
    { id:'s2_300', name:'NovaSeq S2 300-cycle', price:7921.80,  readsM:3300, cycles:300 },
    { id:'s4_300', name:'NovaSeq S4 300-cycle', price:11742.89, readsM:8500, cycles:300 }
  ],

  sc: {
    rna35:    { name: "10x 3'/5' RNA-seq",                   price: 1668.50 },
    ocm:      { name: "10x 3'/5' RNA-seq OCM (multiplexed)", price: 1759.50 },
    atac:     { name: '10x ATAC-seq',                        price: 1986.00 },
    multiome: { name: '10x Multiome (RNA + ATAC)',           price: 3107.25 },
    flex:     { name: '10x Flex', runPrice: 422.97, samplePrice: 307.51 },
    hive:     { name: 'Honeycomb HIVE',                      price:  837.77 }
  },

  spatial: {
    visiumhd: { name: 'Visium HD',               price: 12887.70 },
    xenium:   { name: 'Xenium (Standard panel)', samplePrepPrice: 695.00, runPrice: 2520.00 },
    xenium5k: { name: 'Xenium (5K panel)',        samplePrepPrice: 695.00, runPrice: 7510.00 }
  },

  arrays: {
    epic:  { name: 'EPIC (Human Methylation)', price: 255.99 },
    mouse: { name: 'Infinium Mouse Methylation', price: 250.03 }
  },
  epicFFPERestoration: 123.84   // FFPE restoration reagent, EPIC arrays only (FY27)
};

// ─── GMBSR INTAKE FORM ─────────────────────────────────────────────────────
// Smartsheet form pre-fill uses exact column NAMES (not IDs) as URL keys.
var GMBSR_FORM = {
  url: 'https://app.smartsheet.com/b/form/d5270695c4ea4610b5608cda034b4a1b',
  cols: { workflow: 'Workflow', samples: 'Number of samples', notes: 'Notes' }
};
var WORKFLOW_MAP = {
  bulk:    { ribo:'RNAseq Ribo (-)', e3end:'RNAseq 3p', tcr:'TCR-seq', bcr:'BCR-seq', dna:'DNAseq' },
  sc:      { rna35:'10x 3p', ocm:'10x 3p', atac:'10x ATAC', multiome:'10x Multiome', flex:'10x Flex' },
  spatial: { visiumhd:'Visium HD', xenium:'Xenium', xenium5k:'Xenium' },
  arrays:  { epic:'Methylation array', mouse:'Methylation array' }
};

// ─── LABOR ─────────────────────────────────────────────────────────────────
// Returns { hours, batches, batchSize, hrsPerBatch, total }
function calcLabor(type, n) {
  var rate = P.laborRate, hrsPerBatch, batchSize;
  switch (type) {
    case 'dna':     hrsPerBatch = 6;  batchSize = 48; break;
    case 'rna':     hrsPerBatch = 8;  batchSize = 48; break;
    case 'sc':      hrsPerBatch = 8;  batchSize = 8;  break;
    case 'spatial': hrsPerBatch = 16; batchSize = 1;  break;  // Visium HD: per slide
    case 'xenium':  hrsPerBatch = 16; batchSize = 2;  break;  // Xenium: per 2-slide run
    case 'array':   hrsPerBatch = 16; batchSize = 96; break;  // Arrays: 16 hrs per 96-sample batch
  }
  var batches = Math.ceil(n / batchSize);
  var hours   = batches * hrsPerBatch;
  return { hours: hours, batches: batches, batchSize: batchSize, hrsPerBatch: hrsPerBatch, total: hours * rate };
}

// ─── STATE ─────────────────────────────────────────────────────────────────
var S = freshState();
function freshState() {
  return {
    category: null,
    bulkAssay: null, bulkSamples: 1, bulkReadsPerSample: null,
    bulkExtraction: false, bulkFFPE: false, bulkQC: false, bulkRun: null,
    scPlatform: null, scSamples: 1, scFixation: false, scTissuePrep: false,
    scCellsPerSample: 5000, scReadsPerCell: 25000, scRun: null,
    spatialPlatform: null, spatialSlides: 1, spatialTissuePrep: false,
    arrayAssay: null, arraySamples: 8, arrayFFPE: false
  };
}

// ─── STEP SEQUENCES ────────────────────────────────────────────────────────
var PATHS = {
  bulk:    ['start','bulk_assay','bulk_params','bulk_reads','bulk_summary'],
  sc:      ['start','sc_platform','sc_params','sc_summary'],
  spatial: ['start','spatial_platform','spatial_params','spatial_summary'],
  arrays:  ['start','array_assay','array_params','array_summary']
};
var STEP_LABELS = {
  start:'Category', bulk_assay:'Assay', bulk_params:'Parameters',
  bulk_reads:'Sequencing', bulk_summary:'Estimate',
  sc_platform:'Platform', sc_params:'Parameters', sc_summary:'Estimate',
  spatial_platform:'Platform', spatial_params:'Parameters', spatial_summary:'Estimate',
  array_assay:'Array', array_params:'Parameters', array_summary:'Estimate'
};

var currentStep = 'start';
function path()    { return S.category ? PATHS[S.category] : ['start']; }
function stepIdx() { return path().indexOf(currentStep); }
function goTo(id)  { currentStep = id; render(); scrollWizardToTop(); }
function goBack()  { var p = path(), i = p.indexOf(currentStep); if (i > 0) { currentStep = p[i-1]; render(); scrollWizardToTop(); } }
function scrollWizardToTop() {
  var el = document.querySelector('.gsr-wizard') || document.getElementById('wizardContent');
  if (el && typeof el.scrollIntoView === 'function') {
    el.scrollIntoView({ block: 'start', behavior: 'auto' });
  }
  if (window.parent !== window) {
    try { window.parent.postMessage({ type: 'gsr-estimator:scrollTop' }, '*'); } catch (e) {}
  }
}

// ─── RENDER ROUTER ─────────────────────────────────────────────────────────
function render() {
  renderProgress();
  var html = '';
  switch (currentStep) {
    case 'start':            html = renderStart();          break;
    case 'bulk_assay':       html = renderBulkAssay();      break;
    case 'bulk_params':      html = renderBulkParams();     break;
    case 'bulk_reads':       html = renderBulkReads();      break;
    case 'bulk_summary':     html = renderBulkSummary();    break;
    case 'sc_platform':      html = renderSCPlatform();     break;
    case 'sc_params':        html = renderSCParams();       break;
    case 'sc_summary':       html = renderSCSummary();      break;
    case 'spatial_platform': html = renderSpatialPlat();    break;
    case 'spatial_params':   html = renderSpatialParams();  break;
    case 'spatial_summary':  html = renderSpatialSummary(); break;
    case 'array_assay':      html = renderArrayAssay();     break;
    case 'array_params':     html = renderArrayParams();    break;
    case 'array_summary':    html = renderArraySummary();   break;
  }
  document.getElementById('wizardContent').innerHTML = html;
  bindEvents();
}

function renderProgress() {
  var p = path(), idx = p.indexOf(currentStep);
  document.getElementById('progressBar').innerHTML = p.map(function(s, i) {
    var cls = 'gsr-progress-step' + (i < idx ? ' done' : i === idx ? ' active' : '');
    return '<div class="' + cls + '"></div>';
  }).join('');
  document.getElementById('progressLabel').textContent =
    'Step ' + (idx+1) + ' of ' + p.length + ' — ' + (STEP_LABELS[currentStep] || '');
}

// ─── STEP: START ───────────────────────────────────────────────────────────
function renderStart() {
  var cats = [
    ['bulk',    '🧬', 'Bulk DNA/RNA Sequencing',  "RNA-seq (Ribo-, 3'-End), TCR-seq, BCR-seq, or DNA-seq"],
    ['sc',      '🔬', 'Single Cell Genomics',      '10x Chromium: RNA-seq, ATAC, Multiome, Flex'],
    ['spatial', '🗺️', 'Spatial Genomics',          'Visium HD or Xenium in situ'],
    ['arrays',  '🧫', 'Illumina Arrays',            'EPIC Human or Infinium Mouse Methylation arrays']
  ];
  return '<div class="gsr-step-title">What type of experiment are you planning?</div>' +
    '<p class="gsr-step-desc">Select a category to get started.</p>' +
    '<div class="gsr-cards">' +
    cats.map(function(c) {
      return '<div class="gsr-card' + (S.category === c[0] ? ' selected' : '') +
        '" data-action="selectCat" data-val="' + c[0] + '">' +
        '<div class="card-icon">' + c[1] + '</div>' +
        '<div class="card-label">' + c[2] + '</div>' +
        '<div class="card-desc">'  + c[3] + '</div></div>';
    }).join('') + '</div>' +
    '<div class="gsr-btn-row"><button class="gsr-btn gsr-btn-primary" data-action="nextFromStart"' +
    (!S.category ? ' disabled' : '') + '>Next →</button></div>';
}

// ─── STEP: BULK ASSAY ──────────────────────────────────────────────────────
function renderBulkAssay() {
  return '<div class="gsr-step-title">Select your sequencing assay</div>' +
    '<p class="gsr-step-desc">Choose the library preparation type for your samples.</p>' +
    '<div class="gsr-cards">' +
    Object.entries(P.bulk).map(function(e) {
      var k = e[0], a = e[1];
      return '<div class="gsr-card' + (S.bulkAssay === k ? ' selected' : '') +
        '" data-action="selectBulkAssay" data-val="' + k + '">' +
        '<div class="card-label">' + a.name + '</div>' +
        '<div class="card-desc">$' + a.price.toFixed(2) + '/sample · ' +
        a.defaultReads + 'M reads/sample recommended<br>' +
        a.recCycles + '-cycle sequencing kit recommended</div></div>';
    }).join('') + '</div>' +
    navBtns('back', 'bulk_params', !S.bulkAssay);
}

// ─── STEP: BULK PARAMS ─────────────────────────────────────────────────────
function renderBulkParams() {
  return '<div class="gsr-step-title">Experiment parameters</div>' +
    '<p class="gsr-step-desc">Enter your sample count and select add-ons.</p>' +
    '<div class="gsr-field">' +
      '<label for="bulkSamples">Number of samples</label>' +
      '<input class="gsr-input-num" type="number" id="bulkSamples" min="1" max="9999" value="' + S.bulkSamples + '">' +
    '</div>' +
    '<hr class="gsr-divider">' +
    '<div class="gsr-field"><label>Optional add-ons</label>' +
      '<div class="gsr-check-group">' +
        '<label class="gsr-check-item">' +
          '<input type="checkbox" id="bulkExtraction"' + (S.bulkExtraction ? ' checked' : '') + '>' +
          '<span class="cb-text"><div class="cb-label">Include nucleic acid extraction</div>' +
          '<div class="cb-price">$13.84/sample (standard) · $10.60/sample (FFPE)</div></span>' +
        '</label>' +
        '<div class="gsr-sub-check" id="ffpeWrap" style="' + (S.bulkExtraction ? '' : 'display:none') + '">' +
          '<label class="gsr-check-item">' +
            '<input type="checkbox" id="bulkFFPE"' + (S.bulkFFPE ? ' checked' : '') + '>' +
            '<span class="cb-text"><div class="cb-label">FFPE samples</div>' +
            '<div class="cb-price">Uses FFPE extraction rate ($10.60/sample)</div></span>' +
          '</label>' +
        '</div>' +
        '<label class="gsr-check-item">' +
          '<input type="checkbox" id="bulkQC"' + (S.bulkQC ? ' checked' : '') + '>' +
          '<span class="cb-text"><div class="cb-label">Include QC (Qubit + Fragment Analyzer)</div>' +
          '<div class="cb-price">$' + (P.qubit + P.fragAnalyzer).toFixed(2) + '/sample</div></span>' +
        '</label>' +
      '</div>' +
    '</div>' +
    navBtns('back', 'bulk_reads');
}

// ─── STEP: BULK READS ──────────────────────────────────────────────────────
function calcRunOptions(totalReadsM, numSamples) {
  numSamples = numSamples || S.bulkSamples;
  return P.runs.map(function(r) {
    var n = Math.ceil(totalReadsM / r.readsM);
    var cost = n * r.price;
    return { id:r.id, name:r.name, readsM:r.readsM, cycles:r.cycles,
             numRuns:n, totalCost:cost, perSample: cost / numSamples };
  });
}

function bestRun(options, recCycles) {
  // Prefer recommended cycle length; fall back to all options
  var pool = options.filter(function(r) { return r.cycles === recCycles; });
  if (!pool.length) pool = options;
  return pool.reduce(function(b, r) { return r.totalCost < b.totalCost ? r : b; });
}

function buildRunRows(options, recRun, recCycles, radioName, selectedId) {
  radioName  = radioName  || 'runRadio';
  selectedId = selectedId !== undefined ? selectedId : S.bulkRun;
  return options.map(function(r) {
    var isBest = r.id === recRun.id;
    var rowCls = isBest ? ' class="rec-row"' : '';
    var badges = isBest ? '<span class="badge badge-best">Recommended kit</span>' : '';
    var checked = selectedId === r.id ? ' checked' : (isBest && !selectedId ? ' checked' : '');
    var readsLabel = r.readsM >= 1000 ? (r.readsM/1000).toFixed(1) + 'B' : r.readsM + 'M';
    return '<tr' + rowCls + '>' +
      '<td class="run-name">' + r.name + badges + '</td>' +
      '<td>' + readsLabel + '</td>' +
      '<td style="text-align:center">' + r.numRuns + '</td>' +
      '<td style="text-align:right">$' + fmt(r.totalCost) + '</td>' +

// ─── STEP: BULK SUMMARY ────────────────────────────────────────────────────
function renderBulkSummary() {
  var assay  = P.bulk[S.bulkAssay];
  var n      = S.bulkSamples;
  var rps    = S.bulkReadsPerSample !== null ? S.bulkReadsPerSample : assay.defaultReads;
  var totalM = n * rps;
  var run    = P.runs.find(function(r) { return r.id === S.bulkRun; });
  var numRuns = Math.ceil(totalM / run.readsM);
  var laborType = S.bulkAssay === 'dna' ? 'dna' : 'rna';
  var labor  = calcLabor(laborType, n);

  var lines = [];
  lines.push({ label:'Library prep — ' + assay.name, qty:n, unit:assay.price, qtyl:'samples' });
  if (S.bulkExtraction) {
    var ep = S.bulkFFPE ? P.extractionFFPE : P.extraction;
    lines.push({ label:'Nucleic acid extraction' + (S.bulkFFPE ? ' (FFPE)' : ''), qty:n, unit:ep, qtyl:'samples' });
  }
  if (S.bulkQC)
    lines.push({ label:'QC — Qubit + Fragment Analyzer', qty:n, unit:P.qubit+P.fragAnalyzer, qtyl:'samples' });
  lines.push({ label:'Sequencing — ' + run.name, qty:numRuns, unit:run.price, qtyl:'runs' });
  lines.push({
    label: 'Labor',
    qty: labor.hours, unit: P.laborRate, qtyl: 'hrs',
    note: labor.batches + ' batch' + (labor.batches > 1 ? 'es' : '') +
          ' of up to ' + labor.batchSize + ' samples × ' + labor.hrsPerBatch + ' hrs @ $' + fmt(P.laborRate) + '/hr'
  });
  if (S.bulkExtraction) {
    var exBatches = Math.ceil(n / 24);
    var exHours   = exBatches * 3;
    lines.push({
      label: 'Labor — nucleic acid isolation',
      qty: exHours, unit: P.laborRate, qtyl: 'hrs',
      note: exBatches + ' batch' + (exBatches > 1 ? 'es' : '') +
            ' of up to 24 samples × 3 hrs @ $' + fmt(P.laborRate) + '/hr'

  }

  return summaryHTML(
    'Bulk Sequencing Estimate',
    n + ' sample' + (n>1?'s':'') + ' · ' + assay.name + ' · ' + rps + 'M reads/sample',
    lines
  );
}

// ─── STEP: SC PARAMS ───────────────────────────────────────────────────────
function scTotalHtml(totalM, runMult, cells, rpc) {
  return '<strong>' + Math.round(totalM * runMult).toLocaleString() + 'M</strong>' +
    ' (' + S.scSamples + ' sample' + (S.scSamples > 1 ? 's' : '') + ' × ' +
    cells.toLocaleString() + ' cells × ' + rpc.toLocaleString() + ' reads' +
    (runMult > 1 ? ' × 2 libraries' : '') + ')';
}

// OCM: 4 samples per lane, max 5,000 cells per sample per lane.
// If cells/sample > 5,000, each sample uses ⌈cells/5000⌉ slots.
function ocmLanes(samples, cells) {
  return Math.ceil(samples * Math.ceil(cells / 5000) / 4);
}
function ocmLanesHtml(samples, cells) {
  var slotsPerSample = Math.ceil(cells / 5000);
  var totalSlots     = samples * slotsPerSample;
  var lanes          = Math.ceil(totalSlots / 4);
  var detail = slotsPerSample > 1
    ? ' (' + samples + ' sample' + (samples > 1 ? 's' : '') + ' × ' + slotsPerSample +
      ' slots/sample = ' + totalSlots + ' slots, 4 slots/lane)'
    : ' (' + samples + ' sample' + (samples > 1 ? 's' : '') + ', 4 samples/lane)';
  return '<strong>' + lanes + ' lane' + (lanes > 1 ? 's' : '') + '</strong>' + detail;
}

function renderSCParams() {

  var isOCM      = S.scPlatform === 'ocm';
  var hasSeq     = ['flex','rna35','ocm','atac','multiome'].indexOf(S.scPlatform) !== -1;

        '<div class="cb-price">$' + fmt(P.flexTissuePrepFixation) + '/sample</div></span>' +

          '<div class="cb-price">$' + P.sampleFixation.toFixed(2) + '/sample</div></span>' +
        '</label>') +
      '<label class="gsr-check-item">' +
        '<input type="checkbox" id="scTissuePrep"' + (S.scTissuePrep ? ' checked' : '') + '>' +

      '</label>';

  // Sequencing section (Flex, 3'/5' RNA, OCM, ATAC, Multiome)
  var scSeq = '';

    var defRpc  = (S.scPlatform === 'rna35' || isOCM) ? 30000 : 25000;
    var cells   = S.scCellsPerSample || 5000;
    var rpc     = S.scReadsPerCell   || defRpc;
    var totalM  = S.scSamples * cells * rpc / 1e6;
    var runMult = S.scPlatform === 'multiome' ? 2 : 1;
    var options = calcRunOptions(totalM, S.scSamples).map(function(r) {
      var nr = r.numRuns * runMult, tc = r.totalCost * runMult;
      return { id:r.id, name:r.name, readsM:r.readsM, cycles:r.cycles,
               numRuns:nr, totalCost:tc, perSample:tc / S.scSamples };
    });
    var rec     = bestRun(options, 100);
    if (!S.scRun) S.scRun = rec.id;
    var multiomeNote = S.scPlatform === 'multiome'
      ? ' <em>× 2 runs (RNA + ATAC libraries)</em>' : '';
    var ocmLanesRow = isOCM
      ? '<div class="gsr-reads-total" style="margin-top:6px">OCM lanes needed: <span id="scOcmLanesDisplay">' +
          ocmLanesHtml(S.scSamples, cells) + '</span></div>'
      : '';
    scSeq =
      '<hr class="gsr-divider">' +
      '<div class="gsr-reads-box">' +
        '<div class="reads-header">Sequencing depth</div>' +
        '<div class="gsr-reads-row">' +
          '<input type="number" id="scCellsInput" min="1" value="' + cells + '">' +
          '<span>cells per sample' + (isOCM ? ' <em>(max 5,000/lane; >5,000 uses extra slots)</em>' : '') + '</span>' +
        '</div>' +
        '<div class="gsr-reads-row">' +
          '<input type="number" id="scReadsInput" min="1" value="' + rpc + '">' +
          '<span>reads per cell <em>(recommended: ' + defRpc.toLocaleString() + ')</em>' + multiomeNote + '</span>' +
        '</div>' +
        '<div class="gsr-reads-total">Total reads needed: <span id="scTotalDisplay">' +
          scTotalHtml(totalM, runMult, cells, rpc) + '</span></div>' +
        ocmLanesRow +
        '<div class="gsr-rec-note">Recommended kit: <strong>100-cycle</strong></div>' +
      '</div>' +
      '<div class="gsr-run-options"><h4>Select a sequencing run</h4>' +
        '<div class="gsr-run-scroll">' +
          '<table class="gsr-run-table">' +
            '<thead><tr><th>Run type</th><th>Max output</th>' +
            '<th style="text-align:center">Runs needed</th>' +
            '<th style="text-align:right">Run cost</th>' +
            '<th style="text-align:right">$/sample</th>' +
            '<th style="text-align:center">Select</th></tr></thead>' +
            '<tbody id="scRunTableBody">' + buildRunRows(options, rec, 100, 'scRunRadio', S.scRun) + '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>';
  }

  var introDesc = isFlex
    ? 'Flex pricing: one base run cost plus a per-sample cost.'
    : isOCM
      ? 'OCM combines up to 4 samples into a single lane (max 5,000 cells per sample per lane). ' +
        'Library prep is billed per lane ($' + P.sc.ocm.price.toFixed(2) + '/lane).'
      : 'Enter the number of samples for your experiment.';
  var sampleNote = isFlex
    ? '<div class="field-note">Run: $' + P.sc.flex.runPrice.toFixed(2) +
      ' + $' + P.sc.flex.samplePrice.toFixed(2) + '/sample</div>'
    : isOCM
      ? '<div class="field-note">4 samples per lane · $' + P.sc.ocm.price.toFixed(2) + '/lane library prep</div>'
      : '';
  return '<div class="gsr-step-title">Experiment parameters</div>' +
    '<p class="gsr-step-desc">' + introDesc + '</p>' +
    '<div class="gsr-field">' +
      '<label for="scSamples">Number of samples</label>' +
      '<input class="gsr-input-num" type="number" id="scSamples" min="1" max="9999" value="' + S.scSamples + '">' +
      sampleNote +

// ─── STEP: SC SUMMARY ──────────────────────────────────────────────────────
function renderSCSummary() {
  var n      = S.scSamples;
  var isFlex = S.scPlatform === 'flex';
  var isOCM  = S.scPlatform === 'ocm';
  var pl     = P.sc[S.scPlatform];
  var lines  = [];

  var hasSeq = ['flex','rna35','ocm','atac','multiome'].indexOf(S.scPlatform) !== -1;

  // OCM labor and prep are billed per lane (4 user samples = 1 lane).
  var ocmCellsForLanes = S.scCellsPerSample || 5000;
  var lanes  = isOCM ? ocmLanes(n, ocmCellsForLanes) : 0;
  var labor  = calcLabor('sc', isOCM ? lanes : n);

  if (isFlex) {
    lines.push({ label:'10x Flex — Run cost',   qty:1, unit:P.sc.flex.runPrice,    qtyl:'run'     });
    lines.push({ label:'10x Flex — Per sample', qty:n, unit:P.sc.flex.samplePrice, qtyl:'samples' });
    if (S.scTissuePrep)
      lines.push({ label:'Tissue/cell prep and fixation', qty:n, unit:P.flexTissuePrepFixation, qtyl:'samples' });
  } else if (isOCM) {
    lines.push({
      label: pl.name,
      qty: lanes, unit: pl.price, qtyl: 'lanes',
      note: n + ' sample' + (n>1?'s':'') + ' multiplexed at 4/lane' +
            (Math.ceil(ocmCellsForLanes / 5000) > 1
              ? ' · ' + Math.ceil(ocmCellsForLanes / 5000) + ' slots/sample for >5,000 cells/sample'
              : '')
    });
    if (S.scTissuePrep) lines.push({ label:'Tissue/cell preparation', qty:n, unit:P.tissueCellPrep, qtyl:'samples' });
  } else {
    lines.push({ label:pl.name, qty:n, unit:pl.price, qtyl:'samples' });
    if (S.scFixation)   lines.push({ label:'Sample fixation (10x)',   qty:n, unit:P.sampleFixation, qtyl:'samples' });
    if (S.scTissuePrep) lines.push({ label:'Tissue/cell preparation', qty:n, unit:P.tissueCellPrep, qtyl:'samples' });
  }
  if (hasSeq && S.scRun) {
    var scRunData  = P.runs.find(function(r) { return r.id === S.scRun; });
    var scCells    = S.scCellsPerSample || 5000;
    var scRpc      = S.scReadsPerCell   || ((S.scPlatform === 'rna35' || isOCM) ? 30000 : 25000);
    var scTotalM   = n * scCells * scRpc / 1e6;
    var scRunMult  = S.scPlatform === 'multiome' ? 2 : 1;
    var scNumRuns  = Math.ceil(scTotalM / scRunData.readsM) * scRunMult;
    lines.push({
      label: 'Sequencing — ' + scRunData.name,
      qty: scNumRuns, unit: scRunData.price, qtyl: 'runs',
      note: S.scPlatform === 'multiome'
        ? n + ' sample' + (n>1?'s':'') + ' × ' + scCells.toLocaleString() +
          ' cells × 25,000 reads/cell × 2 libraries (RNA + ATAC)'
        : n + ' sample' + (n>1?'s':'') + ' × ' + scCells.toLocaleString() +
          ' cells × ' + scRpc.toLocaleString() + ' reads/cell'
    });
  }
  var laborUnitLabel = isOCM ? 'lanes' : 'samples';
  lines.push({
    label: 'Labor',
    qty: labor.hours, unit: P.laborRate, qtyl: 'hrs',
    note: labor.batches + ' batch' + (labor.batches > 1 ? 'es' : '') +
          ' of up to ' + labor.batchSize + ' ' + laborUnitLabel +
          ' × ' + labor.hrsPerBatch + ' hrs @ $' + fmt(P.laborRate) + '/hr'
  });

  var seqNote = hasSeq ? '' :
    '<div class="gsr-info-box">📌 <strong>Sequencing not included above.</strong> ' +
    'Library sequencing is quoted separately based on your target read depth. ' +
    '100-cycle kits are recommended for most single cell workflows. ' +
    '<a href="/gsr/contact/" style="color:var(--green-dark)">Contact the GSR</a> to discuss sequencing options for your project.</div>';

  var subtitle = n + ' sample' + (n>1?'s':'') +
    (isOCM ? ' (' + lanes + ' OCM lane' + (lanes > 1 ? 's' : '') + ')' : '') +
    ' · ' + (isFlex ? '10x Flex' : pl.name);

  return summaryHTML(
    'Single Cell Estimate',
    subtitle,
    lines,
    seqNote
  );
}

      '<div class="field-note" id="arrayBatchNote">' +
        batches + ' batch' + (batches > 1 ? 'es' : '') + ' · ' +
        (batches * 16) + ' hrs labor · $' + a.price.toFixed(2) + '/sample array reagents' +
      '</div>' +
      '<div class="field-note">Arrays must be run in sets of 8</div>' +
    '</div>' +
    ffpeSection +
    navBtns('back', 'array_summary', false, 'View Estimate →');
}

// ─── STEP: ARRAY SUMMARY ───────────────────────────────────────────────────
function renderArraySummary() {
  var a     = P.arrays[S.arrayAssay];
  var n     = S.arraySamples;
  var labor = calcLabor('array', n);
  var lines = [];
  lines.push({ label: a.name + ' array reagents', qty: n, unit: a.price, qtyl: 'samples' });
  if (S.arrayFFPE && S.arrayAssay === 'epic') {
    lines.push({ label: 'FFPE sample restoration', qty: n, unit: P.epicFFPERestoration, qtyl: 'samples' });
  }
  lines.push({
    label: 'Labor',
    qty: labor.hours, unit: P.laborRate, qtyl: 'hrs',
    note: labor.batches + ' batch' + (labor.batches > 1 ? 'es' : '') +
          ' of up to ' + labor.batchSize + ' samples × ' + labor.hrsPerBatch + ' hrs @ $' + fmt(P.laborRate) + '/hr'
  });
  return summaryHTML(
    'Illumina Array Estimate',
    n + ' sample' + (n > 1 ? 's' : '') + ' · ' + a.name,
    lines
  );
}

// ─── SHARED SUMMARY ────────────────────────────────────────────────────────
function summaryHTML(title, subtitle, lines, extraNote) {
  var total = 0;
  var rows = lines.map(function(l) {
    var cost = l.qty * l.unit;
    total += cost;
    var mainRow = '<tr>' +
      '<td>' + l.label + '</td>' +
      '<td>' + l.qty + ' ' + l.qtyl + '</td>' +
      '<td class="right">$' + fmt(l.unit) + '</td>' +
      '<td class="right"><strong>$' + fmt(cost) + '</strong></td>' +
      '</tr>';
    var noteRow = l.note
      ? '<tr><td colspan="4" class="note">' + l.note + '</td></tr>'
      : '';
    return mainRow + noteRow;
  }).join('');

  window.__gsrSummary = { title: title, subtitle: subtitle, total: total };

  return '<div id="gsr-pdf-target">' +
      '<div class="gsr-step-title">' + title + '</div>' +
      '<p class="gsr-step-desc">' + subtitle + '</p>' +
      (extraNote || '') +
      '<div class="gsr-summary-box">' +
        '<table class="gsr-summary-table">' +
          '<thead><tr><th>Line item</th><th>Quantity</th>' +
          '<th class="right">Unit price</th><th class="right">Subtotal</th></tr></thead>' +
          '<tbody>' + rows +
            '<tr class="total-row">' +
              '<td colspan="3">Estimated Total</td>' +
              '<td class="right">$' + fmt(total) + '</td>' +
            '</tr>' +
          '</tbody>' +
        '</table>' +
      '</div>' +
      '<p class="gsr-disclaimer">This is an estimate only, based on FY27 internal (Dartmouth) rates. ' +
      'Actual costs may vary depending on experimental complexity and final scope. ' +
      '<a href="mailto:gmbsr@groups.dartmouth.edu">Contact the GSR</a> to discuss your project and receive a formal quote.</p>' +
    '</div>' +
    '<p class="gsr-submit-help">Ready to start your project? The button below downloads this estimate as a PDF and opens the GMBSR intake form (with the workflow and sample count pre-filled). Attach the downloaded PDF and complete the remaining fields to submit.</p>' +
    '<div class="gsr-btn-row">' +
      '<button class="gsr-btn gsr-btn-secondary" data-action="back">← Back</button>' +
      '<button class="gsr-btn gsr-btn-ghost" data-action="startOver">Start Over</button>' +
      '<button class="gsr-btn gsr-btn-secondary" onclick="window.print()">Print Estimate</button>' +
      '<button class="gsr-btn gsr-btn-primary" data-action="submitGMBSR">Submit Project Request →</button>' +
    '</div>';
}

// ─── SUBMIT TO GMBSR ───────────────────────────────────────────────────────
function buildGmbsrPayload() {
  var wf = [], samples = 0, extras = [];
  if (S.category === 'bulk') {
    if (WORKFLOW_MAP.bulk[S.bulkAssay]) wf.push(WORKFLOW_MAP.bulk[S.bulkAssay]);
    if (S.bulkExtraction) {
      var isDna = S.bulkAssay === 'dna';
      wf.push((isDna ? 'DNA' : 'RNA') + (S.bulkFFPE ? ' FFPE extraction' : ' extraction'));
    }
    if (S.bulkQC) extras.push('Sample QC requested');
    samples = S.bulkSamples;
  } else if (S.category === 'sc') {
    if (WORKFLOW_MAP.sc[S.scPlatform]) wf.push(WORKFLOW_MAP.sc[S.scPlatform]);
    else if (S.scPlatform === 'hive') extras.push('Platform: Honeycomb HIVE (no matching Workflow option)');
    if (S.scPlatform === 'rna35' || S.scPlatform === 'ocm') extras.push('Confirm 3′ vs 5′ chemistry on intake');
    if (S.scPlatform === 'ocm') {
      var ocmCells = S.scCellsPerSample || 5000;
      extras.push('OCM (multiplexed): ' + ocmLanes(S.scSamples, ocmCells) + ' lane(s) for ' +
                  S.scSamples + ' user sample(s) at 4/lane');
    }
    if (S.scTissuePrep) extras.push('Tissue/cell prep requested');
    if (S.scFixation) extras.push('Sample fixation requested');
    samples = S.scSamples;
  } else if (S.category === 'spatial') {
    if (WORKFLOW_MAP.spatial[S.spatialPlatform]) wf.push(WORKFLOW_MAP.spatial[S.spatialPlatform]);
    if (S.spatialPlatform === 'xenium5k') extras.push('Xenium panel: 5K');
    if (S.spatialPlatform === 'xenium') extras.push('Xenium panel: Standard');
    if (S.spatialTissuePrep) extras.push('Tissue prep requested');
    samples = S.spatialSlides;
  } else if (S.category === 'arrays') {
    if (WORKFLOW_MAP.arrays[S.arrayAssay]) wf.push(WORKFLOW_MAP.arrays[S.arrayAssay]);
    if (S.arrayFFPE) wf.push('+FFPE restoration');
    extras.push('Array type: ' + (S.arrayAssay === 'epic' ? 'EPIC (Human)' : 'Infinium Mouse'));
    samples = S.arraySamples;
  }

  var s = window.__gsrSummary || {};
  var notes = ['GSR Cost Estimator submission'];
  if (s.title) notes.push(s.title);
  if (samples) notes.push('Samples: ' + samples);
  if (typeof s.total === 'number') notes.push('Estimated total: $' + fmt(s.total));
  if (extras.length) notes.push('', 'Details:', '  - ' + extras.join('\n  - '));
  notes.push('', 'Generated ' + new Date().toLocaleDateString() + '. PDF estimate attached separately.');

  return { workflow: wf, samples: samples, notes: notes.join('\n') };
}

function submitToGMBSR() {
  if (typeof html2pdf === 'undefined') {
    alert('PDF library still loading — please try again in a moment.');
    return;
  }
  var payload = buildGmbsrPayload();
  var target = document.getElementById('gsr-pdf-target');
  if (!target) return;

  var stamp = new Date().toISOString().slice(0, 10);
  html2pdf().set({
    margin: 0.5,
    filename: 'GSR-cost-estimate-' + stamp + '.pdf',
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
  }).from(target).save();

  var p = new URLSearchParams();
  if (payload.workflow.length) p.set(GMBSR_FORM.cols.workflow, payload.workflow.join('\n'));
  if (payload.samples) p.set(GMBSR_FORM.cols.samples, String(payload.samples));
  p.set(GMBSR_FORM.cols.notes, payload.notes);
  window.open(GMBSR_FORM.url + '?' + p.toString(), '_blank', 'noopener');
}

// ─── HELPERS ───────────────────────────────────────────────────────────────
function fmt(n) { return n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function navBtns(back, next, nextDisabled, nextLabel) {
  var bb = back === 'back'
    ? '<button class="gsr-btn gsr-btn-secondary" data-action="back">← Back</button>' : '';
  var nb = next
    ? '<button class="gsr-btn gsr-btn-primary" data-action="goTo" data-val="' + next + '"' +
      (nextDisabled ? ' disabled' : '') + '>' + (nextLabel || 'Next →') + '</button>' : '';
  return '<div class="gsr-btn-row">' + bb + nb + '</div>';
}

function saveInputs() {
  var v;
  v = document.getElementById('bulkSamples');      if (v) S.bulkSamples    = Math.max(1, parseInt(v.value)||1);
  v = document.getElementById('bulkSamplesLive');  if (v) S.bulkSamples    = Math.max(1, parseInt(v.value)||1);
  v = document.getElementById('bulkExtraction');   if (v) S.bulkExtraction  = v.checked;
  v = document.getElementById('bulkFFPE');         if (v) S.bulkFFPE        = v.checked;
  v = document.getElementById('bulkQC');           if (v) S.bulkQC          = v.checked;
  v = document.getElementById('readsInput');       if (v) S.bulkReadsPerSample = Math.max(1, parseInt(v.value)||1);
  v = document.querySelector('input[name="runRadio"]:checked'); if (v) S.bulkRun = v.value;
  v = document.getElementById('scSamples');        if (v) S.scSamples            = Math.max(1, parseInt(v.value)||1);
  v = document.getElementById('scFixation');       if (v) S.scFixation           = v.checked;
  v = document.getElementById('scTissuePrep');     if (v) S.scTissuePrep         = v.checked;
  v = document.getElementById('scCellsInput');   if (v) S.scCellsPerSample   = Math.max(1, parseInt(v.value)||5000);
  v = document.getElementById('scReadsInput');   if (v) S.scReadsPerCell      = Math.max(1, parseInt(v.value)||25000);
  v = document.querySelector('input[name="scRunRadio"]:checked'); if (v) S.scRun = v.value;
  v = document.getElementById('spatialSlides');    if (v) S.spatialSlides = Math.max(1, parseInt(v.value)||1);
  v = document.getElementById('spatialTissuePrep');if (v) S.spatialTissuePrep = v.checked;
  v = document.getElementById('arraySamples');     if (v) S.arraySamples  = Math.max(8, parseInt(v.value)||8);
  v = document.getElementById('arrayFFPE');        if (v) S.arrayFFPE     = v.checked;
}

// ─── EVENT BINDING ─────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(function(el) {
    el.addEventListener('click', handleClick);
  });

  var bulkEx = document.getElementById('bulkExtraction');
  if (bulkEx) {
    bulkEx.addEventListener('change', function() {
      S.bulkExtraction = this.checked;
      var w = document.getElementById('ffpeWrap');
      if (w) w.style.display = this.checked ? '' : 'none';
    });
  }

  function updateBulkTotal() {
    var assay  = P.bulk[S.bulkAssay];
    var rps    = S.bulkReadsPerSample !== null ? S.bulkReadsPerSample : assay.defaultReads;
    var totalM = S.bulkSamples * rps;
    var disp   = document.getElementById('totalDisplay');
    if (disp) disp.innerHTML = bulkTotalHtml(totalM, S.bulkSamples, rps);
    var tbody  = document.getElementById('runTableBody');
    if (tbody) {
      var options = calcRunOptions(totalM);
      var rec     = bestRun(options, assay.recCycles);
      tbody.innerHTML = buildRunRows(options, rec, assay.recCycles);
      document.querySelectorAll('input[name="runRadio"]').forEach(function(r) {
        r.addEventListener('change', function() { S.bulkRun = this.value; });
      });
    }
  }

  var bulkSampLive = document.getElementById('bulkSamplesLive');
  if (bulkSampLive) bulkSampLive.addEventListener('input', function() {
    S.bulkSamples = Math.max(1, parseInt(this.value)||1);
    updateBulkTotal();
  });

  var ri = document.getElementById('readsInput');
  if (ri) ri.addEventListener('input', function() {
    S.bulkReadsPerSample = Math.max(1, parseInt(this.value)||1);
    updateBulkTotal();
  });

  document.querySelectorAll('input[name="runRadio"]').forEach(function(r) {
    r.addEventListener('change', function() { S.bulkRun = this.value; });
  });

  function updateSCTotal() {
    var cells   = S.scCellsPerSample || 5000;
    var rpc     = S.scReadsPerCell   || ((S.scPlatform === 'rna35' || S.scPlatform === 'ocm') ? 30000 : 25000);
    var totalM  = S.scSamples * cells * rpc / 1e6;
    var runMult = S.scPlatform === 'multiome' ? 2 : 1;
    var disp    = document.getElementById('scTotalDisplay');
    if (disp) disp.innerHTML = scTotalHtml(totalM, runMult, cells, rpc);
    var laneDisp = document.getElementById('scOcmLanesDisplay');
    if (laneDisp) laneDisp.innerHTML = ocmLanesHtml(S.scSamples, cells);
    var tbody = document.getElementById('scRunTableBody');
    if (tbody) {
      var options = calcRunOptions(totalM, S.scSamples).map(function(r) {
        var nr = r.numRuns * runMult, tc = r.totalCost * runMult;
        return { id:r.id, name:r.name, readsM:r.readsM, cycles:r.cycles,
                 numRuns:nr, totalCost:tc, perSample:tc / S.scSamples };
      });
      var rec = bestRun(options, 100);
      tbody.innerHTML = buildRunRows(options, rec, 100, 'scRunRadio', S.scRun);
      document.querySelectorAll('input[name="scRunRadio"]').forEach(function(r) {
        r.addEventListener('change', function() { S.scRun = this.value; });
      });
    }
  }

  var scSamp = document.getElementById('scSamples');
  if (scSamp) scSamp.addEventListener('input', function() {
    S.scSamples = Math.max(1, parseInt(this.value)||1);
    updateSCTotal();
  });

  var flexCi = document.getElementById('scCellsInput');
  if (flexCi) flexCi.addEventListener('input', function() {
    S.scCellsPerSample = Math.max(1, parseInt(this.value)||5000);
    updateSCTotal();
  });

  var flexRi = document.getElementById('scReadsInput');
  if (flexRi) flexRi.addEventListener('input', function() {
    S.scReadsPerCell = Math.max(1, parseInt(this.value)||25000);
    updateSCTotal();
  });

  document.querySelectorAll('input[name="scRunRadio"]').forEach(function(r) {
    r.addEventListener('change', function() { S.scRun = this.value; });
  });

  var arrSamp = document.getElementById('arraySamples');
  if (arrSamp) {
    arrSamp.addEventListener('input', function() {
      var n = Math.max(8, parseInt(this.value)||8);
      S.arraySamples = n;
      var note = document.getElementById('arrayBatchNote');
      if (note && S.arrayAssay) {
        var b = Math.ceil(n / 96);
        var a = P.arrays[S.arrayAssay];
        note.textContent = b + ' batch' + (b > 1 ? 'es' : '') + ' · ' +
          (b * 16) + ' hrs labor · $' + a.price.toFixed(2) + '/sample array reagents';
      }
    });
  }
}

function handleClick(e) {
  var action = this.dataset.action, val = this.dataset.val;
  switch (action) {
    case 'selectCat':
      S.category = val; S.bulkAssay = null; S.scPlatform = null; S.spatialPlatform = null; S.arrayAssay = null;
      render(); break;
    case 'nextFromStart':
      if (!S.category) return;
      goTo(S.category === 'bulk' ? 'bulk_assay' : S.category === 'sc' ? 'sc_platform' :
           S.category === 'arrays' ? 'array_assay' : 'spatial_platform');
      break;
    case 'selectBulkAssay':
      S.bulkAssay = val; S.bulkReadsPerSample = null; S.bulkRun = null; render(); break;
    case 'selectArrayAssay':
      S.arrayAssay = val; render(); break;
    case 'selectSCPlatform':
      S.scPlatform = val;
      S.scReadsPerCell = (val === 'rna35' || val === 'ocm') ? 30000 : 25000;
      S.scRun = null;
      render(); break;
    case 'selectSpatialPlatform':
      S.spatialPlatform = val; render(); break;
    case 'goTo':   saveInputs(); goTo(val); break;
    case 'back':   saveInputs(); goBack(); break;
    case 'startOver': S = freshState(); currentStep = 'start'; render(); scrollWizardToTop(); break;
    case 'submitGMBSR': submitToGMBSR(); break;
  }
}

render();
</script>
